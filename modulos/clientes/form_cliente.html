<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG Closet - Cadastro de Clientes</title>
    <link rel="stylesheet" href="../../assets/css/estilo.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <header class="main-header">
        <div class="logo-container">
            <span class="logo-bg">B & G</span> <span class="logo-closet">CLOSET</span>
        </div>
    </header>

    <main class="main-content">
        <div class="form-container">
            <h2>Cadastrar Nova Cliente</h2>
            <form action="valida_cliente.php" method="POST">
                
                <p>
                    <label>Nome Completo:</label>
                    <input type="text" name="nome" required maxlength="100" placeholder="Digite o nome da cliente">
                </p>

                <p>
                    <label>Telefone / WhatsApp:</label>
                    <input type="tel" name="telefone" required maxlength="20" placeholder="(35) 99999-9999">
                </p>

                <button type="submit">Verificar Cadastro</button>
                <a href="../../index.html" class="voltar">Voltar ao Menu</a>
            </form>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const status = urlParams.get('status');

        if (status === 'sucesso') {
            Swal.fire({
                title: 'Sucesso!',
                text: 'Cliente cadastrada com sucesso.',
                icon: 'success',
                confirmButtonColor: '#CFA863' // Bronze da logo
            });
        } else if (status === 'erro') {
            Swal.fire({
                title: 'Erro na Validação!',
                text: 'Verifique os dados informados (nome ou telefone) e tente novamente.',
                icon: 'error',
                confirmButtonColor: '#444f3e'
            });
        }
    </script>
</body>
</html>
