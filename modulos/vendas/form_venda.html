<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BG Closet - Registrar Venda</title>
    <link rel="stylesheet" href="../../assets/css/estilo.css">
</head>
<body>
    <h2>Registrar Venda</h2>
    <form action="valida_venda.php" method="POST">
        
        <p>
            <label>ID da Cliente (ou Nome):</label><br>
            <input type="text" name="cliente_id" required placeholder="Ex: Maria Silva">
        </p>

        <p>
            <label>Data da Venda:</label><br>
            <input type="date" name="data_venda" required>
        </p>

        <p>
            <label>Valor Total da Venda (R$):</label><br>
            <input type="number" name="valor_total" step="0.01" min="0.01" required>
        </p>

        <p>
            <label>Status do Pagamento:</label><br>
            <select name="status_pagamento" required>
                <option value="">Selecione...</option>
                <option value="Pago">Pago (À vista/PIX)</option>
                <option value="Pendente">Pendente (Fiado)</option>
                <option value="Cancelado">Cancelado</option>
            </select>
        </p>

        <button type="submit">Finalizar Registro</button>
    </form>
</body>
</html>
