<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BG Closet - Cadastro de Produto</title>
    <link rel="stylesheet" href="../../assets/css/estilo.css">
</head>
<body>
    <h2>Novo Produto</h2>
    <form action="valida_produto.php" method="POST">
        
        <p>
            <label>Nome / Descrição:</label><br>
            <input type="text" name="nome_descricao" required maxlength="150"> </p>

        <p>
            <label>Categoria:</label><br>
            <select name="categoria_produto" required>
                <option value="">Selecione...</option>
                <option value="Vestuário">Vestuário</option>
                <option value="Perfumaria">Perfumaria</option>
            </select>
        </p>

        <p>
            <label>Marca:</label><br>
            <input type="text" name="marca" maxlength="50">
        </p>

        <p>
            <label>Tamanho (Deixe vazio para perfumes):</label><br>
            <input type="text" name="tamanho" maxlength="10">
        </p>

        <p>
            <label>Valor de Custo (R$):</label><br>
            <input type="number" name="valor_custo" step="0.01" min="0" required> </p>

        <p>
            <label>Valor de Venda (R$):</label><br>
            <input type="number" name="valor_venda" step="0.01" min="0" required>
        </p>

        <p>
            <label>Quantidade em Estoque:</label><br>
            <input type="number" name="quantidade_estoque" min="0" required>
        </p>

        <button type="submit">Validar Dados</button>
    </form>
</body>
</html>
