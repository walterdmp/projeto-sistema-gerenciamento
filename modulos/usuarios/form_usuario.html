<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG Closet - Cadastro de Usuário</title>
    <link rel="stylesheet" href="../../assets/css/estilo.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <header class="main-header">
        <div class="logo-container">
            <span class="logo-bg">B & G</span> <span class="logo-closet">CLOSET</span>
        </div>
    </header>

    <main class="main-content">
        <div class="form-container">
            <h2>Cadastrar Gestor do Sistema</h2>
            <form action="valida_usuario.php" method="POST">
                
                <p>
                    <label>Nome Completo:</label>
                    <input type="text" name="nome" required maxlength="100">
                </p>

                <p>
                    <label>E-mail de Acesso:</label>
                    <input type="email" name="email" required>
                </p>

                <p>
                    <label>Senha:</label>
                    <input type="password" name="senha" required minlength="6">
                </p>

                <p>
                    <label>Confirmar Senha:</label>
                    <input type="password" name="confirma_senha" required>
                </p>

                <button type="submit">Criar Conta</button>
                <a href="../../index.html" class="voltar">Voltar ao Menu</a>
            </form>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const status = urlParams.get('status');

        if (status === 'sucesso') {
            Swal.fire({
                title: 'Conta Criada!',
                text: 'O usuário foi cadastrado com sucesso e já pode acessar o sistema.',
                icon: 'success',
                confirmButtonColor: '#CFA863' // Bronze
            });
        } else if (status === 'erro') {
            Swal.fire({
                title: 'Erro no Cadastro!',
                text: 'Verifique se as senhas coincidem, se o e-mail é válido e tente novamente.',
                icon: 'error',
                confirmButtonColor: '#444f3e'
            });
        }
    </script>
</body>
</html>
